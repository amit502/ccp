apiVersion: batch/v1
kind: Job
metadata:
  name: ccp-all-experiments
  namespace: kc-ai-research-lab
spec:
  template:
    spec:
      nodeSelector:
        topology.kubernetes.io/region: us-west
        nautilus.io/linstor: "true"
      containers:
        - name: ccp-runner
          image: ubuntu:22.04
          env:
            - name: REPO_PATH
              value: /app/ccp
            - name: OFFICEBENCH_PATH
              value: /app/officebench
            - name: RESULTS_PATH
              value: /results/ccp
            - name: EXPERIMENT
              value: all
            - name: MAX_TASKS
              value: "25"
            - name: MAX_STEPS
              value: "25"
            - name: APPWORLD_URL
              value: http://localhost:8000
            - name: OFFICEBENCH_URL
              value: http://localhost:8001
            - name: OFFICEBENCH_TASKS_DIR
              value: /app/officebench/tasks
            - name: OFFICEBENCH_TASK_IDS_FILE
              value: /results/ccp/task_ids_officebench.txt
            - name: MULTIQA_DATA_FILE
              value: /results/ccp/data/nq-dev-00.jsonl.gz
            - name: DISPLAY
              value: ":99"
            - name: PYTHONPATH
              value: /app
            - name: LLM_DEBUG
              value: "1"
            - name: TOKEN_THRESHOLD
              value: "500"
            - name: GIT_TERMINAL_PROMPT
              value: "0"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: api-key
          command:
            - "bash"
            - "-c"
          args:
            - |
              set -e
              echo "=== CCP All-Benchmarks Job ==="
              echo "Started: $(date)"

              # ── 0. Raise inotify / fd limits ────────────────────────────
              echo 524288 > /proc/sys/fs/inotify/max_user_watches   || true
              echo 524288 > /proc/sys/fs/inotify/max_user_instances || true
              ulimit -n 65535 || true

              # ── 1. System dependencies ───────────────────────────────────
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y -qq \
                python3 python3-pip git wget curl \
                libreoffice \
                xvfb \
                libgl1-mesa-glx \
                libglib2.0-0

              # ── 2. Start virtual display (headless LibreOffice) ──────────
              Xvfb :99 -screen 0 1024x768x24 -nolisten tcp &
              XVFB_PID=$!
              sleep 2
              echo "Xvfb started on display :99"

              # ── 3. Clone OfficeBench ─────────────────────────────────────
              git clone https://github.com/zlwang-cs/OfficeBench.git ${OFFICEBENCH_PATH}
              pip3 install -r ${OFFICEBENCH_PATH}/requirements.txt -q

              # ── 4. Clone and install CCP ─────────────────────────────────
              git clone https://github.com/amit502/ccp.git ${REPO_PATH}
              cd ${REPO_PATH}
              pip3 install -r requirements.txt -q
              pip3 install -e . --no-deps -q
              pip3 install flask python-docx openpyxl python-pptx matplotlib pandas -q

              # ── 5. Start OfficeBench server ──────────────────────────────
              OFFICEBENCH_TASKS_DIR=${OFFICEBENCH_TASKS_DIR} \
                python3 ${REPO_PATH}/officebench_server.py \
                  --port 8001 \
                  --tasks-dir ${OFFICEBENCH_TASKS_DIR} &
              OB_PID=$!

              for i in $(seq 1 12); do
                if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
                  echo "OfficeBench server ready."
                  break
                fi
                echo "  Waiting for OfficeBench... (${i}/12)"
                sleep 5
              done

              # ── 6. Download NQ data (MultiQA) ────────────────────────────
              mkdir -p ${RESULTS_PATH}/data ${RESULTS_PATH}/acon_guidelines
              if [ ! -f ${MULTIQA_DATA_FILE} ]; then
                echo "Downloading Natural Questions dev set..."
                wget -q -O ${MULTIQA_DATA_FILE} \
                  https://storage.googleapis.com/natural_questions/v1.0/dev/nq-dev-00.jsonl.gz
              fi

              # ── 7. Download AppWorld data and start server ───────────────
              echo "Downloading AppWorld data..."
              appworld download all --data-dir ${RESULTS_PATH}/data/appworld

              APPWORLD_DATA_DIR=${RESULTS_PATH}/data/appworld \
                appworld server start --port 8000 &
              APPWORLD_PID=$!

              for i in $(seq 1 12); do
                if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                  echo "AppWorld server ready."
                  break
                fi
                echo "  Waiting for AppWorld... (${i}/12)"
                sleep 5
              done

              # ── 8. ACON offline optimization ─────────────────────────────
              cd /app
              echo "=== ACON Optimization: AppWorld ==="
              RESULTS_PATH=${RESULTS_PATH} \
                python3 -m ccp.experiments.run_experiment \
                  --experiment acon_optimize \
                  --benchmark appworld \
                  --tasks ${MAX_TASKS} || echo "[WARN] ACON appworld optimization failed — using defaults"

              echo "=== ACON Optimization: MultiQA ==="
              RESULTS_PATH=${RESULTS_PATH} \
                python3 -m ccp.experiments.run_experiment \
                  --experiment acon_optimize \
                  --benchmark multiqa \
                  --tasks ${MAX_TASKS} || echo "[WARN] ACON multiqa optimization failed — using defaults"

              # ── 9. Run all 6 methods on all 3 benchmarks ─────────────────
              echo "=== Running All Experiments ==="
              set +e
              RESULTS_PATH=${RESULTS_PATH} \
                python3 -m ccp.experiments.run_experiment \
                  --experiment ${EXPERIMENT} \
                  --tasks ${MAX_TASKS} \
                  --steps ${MAX_STEPS}
              echo "Experiment exit code: $?"

              # ── 10. Cleanup ───────────────────────────────────────────────
              kill ${APPWORLD_PID} 2>/dev/null || true
              kill ${OB_PID}       2>/dev/null || true
              kill ${XVFB_PID}     2>/dev/null || true

              echo "=== Done: $(date) ==="
              echo "CSVs saved:"
              ls -lh ${RESULTS_PATH}/*.csv 2>/dev/null || echo "  none found"
              exit 0

          volumeMounts:
            - name: git-repo
              mountPath: /app
            - name: results-volume
              mountPath: /results
          resources:
            requests:
              memory: 24Gi
              cpu: "4"
            limits:
              memory: 24Gi
              cpu: "4"

      volumes:
        - name: git-repo
          emptyDir: {}
        - name: results-volume
          persistentVolumeClaim:
            claimName: reflexion-data-pvc

      restartPolicy: Never
  backoffLimit: 0
