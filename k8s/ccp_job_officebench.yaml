apiVersion: batch/v1
kind: Job
metadata:
  name: ccp-officebench
  namespace: kc-ai-research-lab
spec:
  template:
    spec:
      nodeSelector:
        topology.kubernetes.io/region: us-west
        nautilus.io/linstor: "true"
      containers:
        - name: ccp-officebench-runner
          image: ubuntu:22.04
          env:
            - name: REPO_PATH
              value: /app/ccp
            - name: OFFICEBENCH_PATH
              value: /app/officebench
            - name: RESULTS_PATH
              value: /results/ccp
            - name: EXPERIMENT
              value: officebench_all
            - name: MAX_TASKS
              value: "15"
            - name: MAX_STEPS
              value: "25"
            - name: OFFICEBENCH_URL
              value: http://localhost:8001
            # Tasks dir inside the cloned OfficeBench repo
            - name: OFFICEBENCH_TASKS_DIR
              value: /app/officebench/tasks
            - name: OFFICEBENCH_TASK_IDS_FILE
              value: /results/ccp/task_ids_officebench.txt
            - name: DISPLAY
              value: ":99"
            - name: PYTHONPATH
              value: /app
            - name: LLM_DEBUG
              value: "1"
            - name: TOKEN_THRESHOLD
              value: "500"
            - name: OFFICEBENCH_TOKEN_THRESHOLD
              value: "80"
            - name: CCP_RECENT_WINDOW
              value: "1"
            - name: CCP_MAX_ANCESTORS
              value: "1"
            - name: GIT_TERMINAL_PROMPT
              value: "0"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: api-key
          command:
            - "bash"
            - "-c"
          args:
            - |
              set -e
              echo "=== CCP OfficeBench Job ==="
              echo "Started: $(date)"

              # ── 0. Raise inotify / fd limits before anything opens files ──
              echo 524288 > /proc/sys/fs/inotify/max_user_watches   || true
              echo 524288 > /proc/sys/fs/inotify/max_user_instances || true
              ulimit -n 65535 || true

              # ── 1. System dependencies ──────────────────────────────────
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y -qq \
                python3 python3-pip git wget curl \
                libreoffice \
                xvfb \
                libgl1-mesa-glx \
                libglib2.0-0

              # ── 2. Start virtual display (headless LibreOffice needs this)
              Xvfb :99 -screen 0 1024x768x24 -nolisten tcp &
              XVFB_PID=$!
              sleep 2
              echo "Xvfb started on display :99"

              # ── 3. Clone OfficeBench ────────────────────────────────────
              git clone https://github.com/zlwang-cs/OfficeBench.git ${OFFICEBENCH_PATH}
              cd ${OFFICEBENCH_PATH}
              pip3 install -r requirements.txt -q

              # ── 4. Clone and install CCP ────────────────────────────────
              # Must happen before server start — server script lives in CCP repo.
              git clone https://github.com/amit502/ccp.git ${REPO_PATH}
              cd ${REPO_PATH}
              pip3 install -r requirements.txt -q
              pip3 install -e . --no-deps -q
              # Flask + office libs needed by officebench_server.py
              pip3 install flask python-docx openpyxl python-pptx -q

              # ── 5. Start OfficeBench server in background ───────────────
              OFFICEBENCH_TASKS_DIR=${OFFICEBENCH_TASKS_DIR} \
                python3 ${REPO_PATH}/officebench_server.py \
                  --port 8001 \
                  --tasks-dir ${OFFICEBENCH_TASKS_DIR} &
              OB_PID=$!

              for i in $(seq 1 12); do
                if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
                  echo "OfficeBench server ready."
                  break
                fi
                echo "  Waiting for OfficeBench... (${i}/12)"
                sleep 5
              done

              # ── 6. Create results directories ───────────────────────────
              mkdir -p ${RESULTS_PATH}

              # Run experiments from /app so ccp is a proper package
              # Disable set -e so Python experiment errors don't kill the job.
              set +e
              cd /app

              # ── 7. ACON optimization skipped for OfficeBench ────────────
              # OfficeBench MCP server requires per-task args (task_id + app) which
              # are incompatible with ACON's task-agnostic offline optimizer.
              # ACON will run on OfficeBench without pre-trained guidelines.

              # ── 8. Run all 6 methods on OfficeBench ─────────────────────
              echo "=== Running OfficeBench: all 6 methods ==="
              RESULTS_PATH=${RESULTS_PATH} \
                python3 -m ccp.experiments.run_experiment \
                  --experiment ${EXPERIMENT} \
                  --tasks ${MAX_TASKS} \
                  --steps ${MAX_STEPS}
              echo "Experiment exit code: $?"

              # ── 9. Cleanup ──────────────────────────────────────────────
              kill ${OB_PID}   2>/dev/null || true
              kill ${XVFB_PID} 2>/dev/null || true

              echo "=== Done: $(date) ==="
              echo "CSVs saved:"
              ls -lh ${RESULTS_PATH}/officebench*.csv 2>/dev/null || echo "  none found"
              exit 0

          volumeMounts:
            - name: git-repo
              mountPath: /app
            - name: results-volume
              mountPath: /results
          resources:
            requests:
              memory: 16Gi
              cpu: "3"
            limits:
              memory: 16Gi
              cpu: "3"

      volumes:
        - name: git-repo
          emptyDir: {}
        - name: results-volume
          persistentVolumeClaim:
            claimName: reflexion-data-pvc

      restartPolicy: Never
  backoffLimit: 0
