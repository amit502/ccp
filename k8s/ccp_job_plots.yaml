apiVersion: batch/v1
kind: Job
metadata:
  name: ccp-plot-generation
  namespace: kc-ai-research-lab
spec:
  template:
    spec:
      nodeSelector:
        topology.kubernetes.io/region: us-west
        nautilus.io/linstor: "true"
      containers:
        - name: plot-generator
          image: python:3.11-slim
          env:
            - name: REPO_PATH
              value: /app/ccp
            - name: RESULTS_PATH
              value: /results/ccp
            - name: PLOT_FORMAT
              value: pdf       # pdf | png | svg
            - name: PLOT_DPI
              value: "300"
          command:
            - "bash"
            - "-c"
          args:
            - |
              echo "=== CCP Plot Generation ==="
              echo "Reading CSVs from: ${RESULTS_PATH}"
              echo "Saving plots to:   ${RESULTS_PATH}/plots"

              apt-get update -qq && apt-get install -y git -qq

              git clone https://github.com/amit502/ccp.git ${REPO_PATH}
              cd ${REPO_PATH}
              pip install -q matplotlib pandas numpy

              mkdir -p ${RESULTS_PATH}/plots

              python plotting/plot_results.py \
                --results-dir ${RESULTS_PATH} \
                --output-dir  ${RESULTS_PATH}/plots \
                --format ${PLOT_FORMAT} \
                --dpi    ${PLOT_DPI}

              echo "=== Plots saved ==="
              ls -lh ${RESULTS_PATH}/plots/

          volumeMounts:
            - name: git-repo
              mountPath: /app
            - name: results-volume
              mountPath: /results
          resources:
            requests:
              memory: 2Gi
              cpu: "1"
            limits:
              memory: 4Gi
              cpu: "2"

      volumes:
        - name: git-repo
          emptyDir: {}
        - name: results-volume
          persistentVolumeClaim:
            claimName: reflexion-data-pvc

      restartPolicy: Never
  backoffLimit: 1
