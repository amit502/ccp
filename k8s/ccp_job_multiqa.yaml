apiVersion: batch/v1
kind: Job
metadata:
  name: ccp-multiqa
  namespace: kc-ai-research-lab
spec:
  template:
    spec:
      nodeSelector:
        topology.kubernetes.io/region: us-west
        nautilus.io/linstor: "true"
      containers:
        - name: ccp-multiqa-runner
          image: ubuntu:22.04
          env:
            - name: REPO_PATH
              value: /app/ccp
            - name: RESULTS_PATH
              value: /results/ccp
            - name: EXPERIMENT
              value: multiqa_all
            - name: MAX_TASKS
              value: "25"
            - name: MAX_STEPS
              value: "20"
            - name: PYTHONPATH
              value: /app
            - name: LLM_DEBUG
              value: "1"
            - name: TOKEN_THRESHOLD
              value: "500"
            - name: GIT_TERMINAL_PROMPT
              value: "0"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: api-key
          command:
            - "bash"
            - "-c"
          args:
            - |
              set -e
              echo "=== CCP Multi-QA Job ==="
              echo "Started: $(date)"

              # ── 1. System dependencies ──────────────────────────────────
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y -qq python3 python3-pip git wget curl

              # ── 2. Clone and install CCP ────────────────────────────────
              git clone https://github.com/amit502/ccp.git ${REPO_PATH}
              cd ${REPO_PATH}
              pip3 install -r requirements.txt -q
              pip3 install -e . --no-deps -q
              pip3 install datasets -q

              # ── 3. Create results directories ───────────────────────────
              mkdir -p ${RESULTS_PATH}/acon_guidelines

              # Run experiments from /app so ccp is a proper package
              # Disable set -e so Python experiment errors don't kill the job.
              set +e
              cd /app

              # ── 5. Run ACON offline optimization ────────────────────────
              echo "=== ACON Offline Optimization ==="
              RESULTS_PATH=${RESULTS_PATH} \
                python3 -m ccp.experiments.run_experiment \
                  --experiment acon_optimize \
                  --benchmark multiqa \
                  --tasks ${MAX_TASKS} \
              || echo "[WARN] ACON optimization failed — continuing without guidelines"

              # ── 6. Run all 6 methods on Multi-QA ────────────────────────
              echo "=== Running Multi-QA: all 6 methods ==="
              RESULTS_PATH=${RESULTS_PATH} \
                python3 -m ccp.experiments.run_experiment \
                  --experiment ${EXPERIMENT} \
                  --tasks ${MAX_TASKS} \
                  --steps ${MAX_STEPS}
              echo "Experiment exit code: $?"

              echo "=== Done: $(date) ==="
              echo "CSVs saved:"
              ls -lh ${RESULTS_PATH}/multiqa*.csv 2>/dev/null || echo "  none found"
              exit 0

          volumeMounts:
            - name: git-repo
              mountPath: /app
            - name: results-volume
              mountPath: /results
          resources:
            requests:
              memory: 8Gi
              cpu: "2"
            limits:
              memory: 8Gi
              cpu: "2"

      volumes:
        - name: git-repo
          emptyDir: {}
        - name: results-volume
          persistentVolumeClaim:
            claimName: reflexion-data-pvc

      restartPolicy: Never
  backoffLimit: 0
